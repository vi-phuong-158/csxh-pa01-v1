<div class="card mt-4">
  <h3 class="text-sm font-semibold text-white mb-3">Kết quả Import</h3>
  {% if error %}
    <div class="text-red-400 text-sm p-3 bg-red-900/30 rounded border border-red-800">
      {{ error }}
    </div>
  {% else %}
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="p-3 bg-green-900/20 border border-green-800/50 rounded text-center">
        <div class="text-2xl font-bold text-green-400">{{ success }}</div>
        <div class="text-xs text-slate-400 uppercase tracking-wider">Thành công</div>
      </div>
      <div class="p-3 bg-red-900/20 border border-red-800/50 rounded text-center">
        <div class="text-2xl font-bold text-red-400">{{ failed }}</div>
        <div class="text-xs text-slate-400 uppercase tracking-wider">Thất bại/Bỏ qua</div>
      </div>
    </div>
    
    {% if errors %}
    <div class="mt-4">
      <h4 class="text-xs font-semibold text-slate-300 mb-2">Chi tiết lỗi:</h4>
      <div class="max-h-48 overflow-y-auto text-xs text-red-400 space-y-1 p-3 bg-surface-900 rounded border border-slate-700">
        {% for err in errors %}
          <p>• Dòng {{ err.row }}: {{ err.msg }}</p>
        {% endfor %}
      </div>
    </div>
    {% endif %}
    
    {% if success > 0 %}
    <div class="mt-4 flex justify-end">
      <a href="/tra-cuu" class="btn-primary">Chuyển đến Tra cứu</a>
    </div>
    {% endif %}
  {% endif %}
</div>
