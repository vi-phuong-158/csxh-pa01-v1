<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập · Security Profile 360</title>
  <link rel="stylesheet" href="/static/css/output.css" />
</head>
<body class="bg-surface-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-600 rounded-2xl mb-3">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">Security Profile 360</h1>
      <p class="text-sm text-slate-400 mt-1">Hệ thống Quản trị An ninh PA01</p>
    </div>

    <!-- Form -->
    <div class="card">
      <h2 class="text-base font-semibold text-white mb-5">Đăng nhập</h2>

      {% if error %}
      <div class="mb-4 px-3 py-2.5 bg-red-900/40 border border-red-700/50 rounded-lg text-sm text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form action="/auth/login" method="post" class="space-y-4">
        <input type="hidden" name="next" value="{{ next }}"/>

        <div>
          <label class="label" for="username">Tên đăng nhập</label>
          <input id="username" name="username" type="text" autocomplete="username"
                 class="input" placeholder="Nhập username" required autofocus />
        </div>

        <div>
          <label class="label" for="password">Mật khẩu</label>
          <input id="password" name="password" type="password" autocomplete="current-password"
                 class="input" placeholder="Nhập mật khẩu" required />
        </div>

        <button type="submit" class="btn-primary w-full justify-center mt-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Đăng nhập
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">Phiên bản 2.0 · PA01 Internal</p>
  </div>
</body>
</html>
