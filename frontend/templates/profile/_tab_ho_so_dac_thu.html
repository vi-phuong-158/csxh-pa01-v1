<div class="space-y-4">
  {% if profile.ho_so_dac_thu %}
  <div class="space-y-3">
    {% for hsd in profile.ho_so_dac_thu %}
    <div class="card border-l-4 border-yellow-500">
      <div class="flex items-start justify-between gap-3">
        <div>
          <span class="badge badge-yellow mb-2">{{ hsd.loai_hinh }}</span>
          <p class="text-sm text-slate-200 whitespace-pre-wrap">{{ hsd.noi_dung or '—' }}</p>
          {% if hsd.ghi_chu %}<p class="text-xs text-slate-400 mt-1">{{ hsd.ghi_chu }}</p>{% endif %}
        </div>
        <button hx-delete="/profile/{{ profile.cccd }}/ho-so-dac-thu/{{ hsd.id }}"
                hx-target="#dynamic-tab-content" hx-swap="innerHTML" hx-confirm="Xóa?"
                class="text-red-400 hover:text-red-300 text-xs shrink-0">Xóa</button>
      </div>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="card" x-data="{open:false}">
    <button @click="open=!open" class="btn-secondary text-xs w-full justify-center">+ Thêm hồ sơ đặc thù</button>
    <form x-show="open" x-cloak
          hx-post="/profile/{{ profile.cccd }}/ho-so-dac-thu"
          hx-target="#dynamic-tab-content" hx-swap="innerHTML"
          class="mt-4 space-y-3">
      <div>
        <label class="label">Loại hình</label>
        <select name="loai_hinh" class="input" required>
          {% for lh in loai_hinh_dac_thu %}<option>{{ lh }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="label">Nội dung chi tiết</label>
        <textarea name="noi_dung_chi_tiet" rows="4" class="input resize-none"></textarea>
      </div>
      <div>
        <label class="label">Ghi chú</label>
        <input name="ghi_chu" type="text" class="input" />
      </div>
      <div class="flex gap-2 justify-end">
        <button type="button" @click="open=false" class="btn-ghost text-xs">Hủy</button>
        <button type="submit" class="btn-primary text-xs">Lưu</button>
      </div>
    </form>
  </div>
</div>
