<div class="space-y-4">
  {% if profile.tai_lieu %}
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr><th>Tên file</th><th>Loại</th><th>Mô tả</th><th></th></tr></thead>
      <tbody>
        {% for tl in profile.tai_lieu %}
        <tr>
          <td>
            <a href="/api/documents/{{ tl.duong_dan }}" target="_blank" class="flex items-center gap-1" style="color:var(--cand-red);font-weight:600;">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
              {{ tl.ten_goc or tl.duong_dan }}
            </a>
          </td>
          <td><span class="pill pill-gray"><span class="dot"></span>{{ tl.loai or '—' }}</span></td>
          <td style="color:var(--ink-500);">{{ tl.mo_ta or '—' }}</td>
          <td class="text-right">
            <button hx-delete="/profile/{{ profile.cccd }}/tai-lieu/{{ tl.id }}"
                    hx-target="#dynamic-tab-content" hx-swap="innerHTML" hx-confirm="Xóa tài liệu này?"
                    class="btn btn-danger btn-xs">Xóa</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
  </div>
  {% endif %}

  <div class="card">
    <div class="section-eyebrow">Thêm tài liệu mới</div>
    <form hx-post="/profile/{{ profile.cccd }}/upload-doc" hx-target="#dynamic-tab-content" hx-swap="innerHTML" hx-encoding="multipart/form-data" class="space-y-3">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="field__label">Loại tài liệu</label>
          <select name="loai_tai_lieu" class="field__select">
            <option value="">-- Chọn loại --</option>
            {% for opt in loai_tai_lieu %}
            <option value="{{ opt }}">{{ opt }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="field__label">Mô tả ngắn</label>
          <input type="text" name="mo_ta" class="field__input" placeholder="Ghi chú về file..." />
        </div>
      </div>
      <div>
        <label class="field__label">File đính kèm (PDF, DOCX, JPG, PNG)</label>
        <input type="file" name="file" class="field__input" required accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" />
      </div>
      <div class="pt-2">
        <button type="submit" class="btn btn-primary w-full md:w-auto">
          <span class="htmx-indicator cand-spin mr-2">⏳</span> Tải lên
        </button>
      </div>
    </form>
  </div>
</div>
