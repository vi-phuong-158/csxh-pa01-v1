<div class="space-y-4">
  {% if profile.lien_he %}
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr><th>Loại</th><th>Giá trị</th><th>Ghi chú</th><th></th></tr></thead>
      <tbody>
        {% for lh in profile.lien_he %}
        <tr>
          <td><span class="pill pill-blue"><span class="dot"></span>{{ lh.loai }}</span></td>
          <td class="font-medium">{{ lh.gia_tri }}</td>
          <td style="color:var(--ink-500);">{{ lh.ghi_chu or '—' }}</td>
          <td>
            <button hx-delete="/profile/{{ profile.cccd }}/lien-he/{{ lh.id }}"
                    hx-target="#dynamic-tab-content" hx-swap="innerHTML" hx-confirm="Xóa?"
                    class="btn btn-danger btn-xs">Xóa</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
  </div>
  {% endif %}

  <div class="card" x-data="{open:false}">
    <button @click="open=!open" class="btn btn-secondary w-full justify-center">+ Thêm liên hệ</button>
    <form x-show="open" x-cloak
          hx-post="/profile/{{ profile.cccd }}/lien-he"
          hx-target="#dynamic-tab-content" hx-swap="innerHTML"
          class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <label class="field__label">Loại liên hệ</label>
        <select name="loai_lien_he" class="field__select">
          {% for l in loai_lien_he %}<option>{{ l }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="field__label">Giá trị</label>
        <input name="gia_tri" type="text" class="field__input" placeholder="SĐT / Email / URL..." required />
      </div>
      <div>
        <label class="field__label">Ghi chú</label>
        <input name="ghi_chu" type="text" class="field__input" placeholder="Ghi chú (tùy chọn)" />
      </div>
      <div class="md:col-span-3 flex gap-2 justify-end">
        <button type="button" @click="open=false" class="btn btn-ghost btn-sm">Hủy</button>
        <button type="submit" class="btn btn-primary btn-sm">Lưu</button>
      </div>
    </form>
  </div>
</div>
